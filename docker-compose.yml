services:
  postgres:
    image: postgres:16-alpine
    container_name: meditrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meditrack
    ports:
      - "5432:5432"
    volumes:
      - meditrack-postgres:/var/lib/postgresql/data

volumes:
  meditrack-postgres:
